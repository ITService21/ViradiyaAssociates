<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Favicon Generator - Viradiya Associates</title>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; background: #f8fafc; padding: 40px; text-align: center; }
    h1 { color: #1e293b; margin-bottom: 10px; }
    p { color: #64748b; margin-bottom: 30px; }
    .favicon-grid { display: flex; gap: 40px; justify-content: center; flex-wrap: wrap; }
    .favicon-item { text-align: center; }
    .favicon-item span { display: block; margin-top: 10px; color: #64748b; font-size: 14px; }
    canvas { border: 1px solid #e2e8f0; border-radius: 12px; }
    .download-btn {
      display: inline-block; margin-top: 30px; padding: 14px 32px;
      background: linear-gradient(135deg, #4f46e5, #6366f1); color: white;
      border: none; border-radius: 12px; font-weight: 600; font-size: 16px;
      cursor: pointer; text-decoration: none;
    }
    .download-btn:hover { box-shadow: 0 10px 30px -5px rgba(79, 70, 229, 0.5); }
  </style>
</head>
<body>

  <h1>Viradiya Associates - Favicon Generator</h1>
  <p>Favicons are auto-generated below. Right-click and "Save Image As" to download.</p>

  <div class="favicon-grid">
    <div class="favicon-item">
      <canvas id="favicon16" width="16" height="16"></canvas>
      <span>16x16 (favicon.ico)</span>
    </div>
    <div class="favicon-item">
      <canvas id="favicon32" width="32" height="32"></canvas>
      <span>32x32</span>
    </div>
    <div class="favicon-item">
      <canvas id="favicon48" width="48" height="48"></canvas>
      <span>48x48</span>
    </div>
    <div class="favicon-item">
      <canvas id="favicon180" width="180" height="180"></canvas>
      <span>180x180 (apple-touch)</span>
    </div>
    <div class="favicon-item">
      <canvas id="favicon512" width="512" height="512"></canvas>
      <span>512x512 (PNG)</span>
    </div>
  </div>

  <br>
  <button class="download-btn" onclick="downloadAll()">Download All Favicons</button>

  <script>
    /* Draws "V" logo on canvas at any size with indigo/purple gradient */
    function drawFavicon(canvasId, size) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');

      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#4f46e5');
      gradient.addColorStop(1, '#7c3aed');

      const r = size * 0.2;
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(size - r, 0);
      ctx.quadraticCurveTo(size, 0, size, r);
      ctx.lineTo(size, size - r);
      ctx.quadraticCurveTo(size, size, size - r, size);
      ctx.lineTo(r, size);
      ctx.quadraticCurveTo(0, size, 0, size - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.fillStyle = gradient;
      ctx.fill();

      ctx.fillStyle = 'white';
      ctx.font = `bold ${size * 0.55}px Inter, system-ui, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('V', size / 2, size / 2 + size * 0.02);
    }

    drawFavicon('favicon16', 16);
    drawFavicon('favicon32', 32);
    drawFavicon('favicon48', 48);
    drawFavicon('favicon180', 180);
    drawFavicon('favicon512', 512);

    function downloadAll() {
      const sizes = [
        { id: 'favicon16', name: 'favicon-16x16.png' },
        { id: 'favicon32', name: 'favicon-32x32.png' },
        { id: 'favicon48', name: 'favicon-48x48.png' },
        { id: 'favicon180', name: 'apple-touch-icon.png' },
        { id: 'favicon512', name: 'favicon-512x512.png' }
      ];

      sizes.forEach(({ id, name }) => {
        const canvas = document.getElementById(id);
        const link = document.createElement('a');
        link.download = name;
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    }
  </script>
</body>
</html>
